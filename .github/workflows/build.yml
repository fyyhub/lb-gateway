name: build

# Build artifacts on every branch push and pull request.
# Tag pushes are handled by release.yml instead.
on:
  push:
    branches:
      - "**"
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web-admin/package-lock.json

      - name: Build admin UI
        working-directory: web-admin
        run: |
          npm ci
          npm run build

      - name: Embed admin UI into the server binary
        run: cp -r web-admin/dist/. internal/webui/dist/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build server binaries
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 windows/amd64 darwin/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            [ "$goos" = "windows" ] && ext=".exe"
            out="dist/server-${goos}-${goarch}${ext}"
            echo "building ${out}"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/server
          done
          ls -lh dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-binaries-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
