name: release

# Publish a GitHub Release with per-platform binaries.
# - Push to main: automatically create the next vX.Y.Z tag and publish it.
# - Push a v* tag: publish that tag directly.
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --tags --force

          head_tag="$(git tag --points-at HEAD --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          if [ -n "$head_tag" ]; then
            echo "HEAD already has release tag ${head_tag}"
            echo "tag=${head_tag}" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          if [ -n "$latest" ]; then
            range="${latest}..HEAD"
            base="${latest#v}"
          else
            range="HEAD"
            base="0.0.0"
          fi

          IFS=. read -r major minor patch <<< "$base"

          commits="$(git log --format=%B "$range")"
          bump="patch"
          if printf '%s\n' "$commits" | grep -Eq '(^|[[:space:]])BREAKING CHANGE:|^[a-zA-Z]+(\([^)]+\))?!:'; then
            bump="major"
          elif printf '%s\n' "$commits" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump="minor"
          fi

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          tag="v${major}.${minor}.${patch}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "$tag"
          git push origin "refs/tags/${tag}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web-admin/package-lock.json

      - name: Build admin UI
        working-directory: web-admin
        run: |
          npm ci
          npm run build

      - name: Embed admin UI into the server binary
        run: cp -r web-admin/dist/. internal/webui/dist/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build and package binaries
        env:
          CGO_ENABLED: "0"
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 windows/amd64 darwin/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            [ "$goos" = "windows" ] && ext=".exe"
            name="lb-gateway-${tag}-${goos}-${goarch}"
            stage="staging/${name}"
            mkdir -p "$stage"
            echo "building ${name}"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "-s -w" -o "${stage}/server${ext}" ./cmd/server
            cp README.md "$stage/"
            cp configs/config.example.json "$stage/"
            if [ "$goos" = "windows" ]; then
              (cd staging && zip -qr "../dist/${name}.zip" "$name")
            else
              tar -czf "dist/${name}.tar.gz" -C staging "$name"
            fi
          done
          (cd dist && sha256sum lb-gateway-* > SHA256SUMS.txt)
          ls -lh dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; skipping publish."
            exit 0
          fi
          prerelease=""
          case "$tag" in *-*) prerelease="--prerelease" ;; esac
          gh release create "$tag" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --generate-notes \
            $prerelease
