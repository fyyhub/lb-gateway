services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /app/bin/server
      - -config
      - /app/configs/config.docker.json
      - -db
      - /app/data/gateway.db
      - -health-check-interval
      - 10s
    environment:
      GATEWAY_ADMIN_USERNAME: ${GATEWAY_ADMIN_USERNAME:-admin}
      GATEWAY_ADMIN_PASSWORD: ${GATEWAY_ADMIN_PASSWORD:-admin123456}
      GATEWAY_ADMIN_SECRET: ${GATEWAY_ADMIN_SECRET:-local-dev-secret}
    depends_on:
      - mock-api-a
      - mock-api-b
    volumes:
      - gateway-data:/app/data
    ports:
      # Everything on one port: gateway at /, admin UI at /admin, admin API at /admin/api.
      - "8080:8080"

  mock-api-a:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /app/bin/mock-api
      - -listen
      - :9001
      - -name
      - mock-api-a
      - -shape
      - a

  mock-api-b:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /app/bin/mock-api
      - -listen
      - :9002
      - -name
      - mock-api-b
      - -shape
      - b

volumes:
  gateway-data:
